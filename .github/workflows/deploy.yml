# ─────────────────────────────────────────────────────────────────────────────
# Deploy Workflow – Production deployment on merge to `main`
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  TF_VERSION: "1.8.5"
  AWS_REGION: ${{ secrets.AWS_REGION }}

  # ECR repository names (ĐÃ SỬA CHUẨN THEO TERRAFORM)
  ECR_REPO_FRONTEND: frontend
  ECR_REPO_CORE: core-backend
  ECR_REPO_REALTIME: realtime-backend

  # ECS names
  ECS_CLUSTER: realtime-collab-cluster
  ECS_SERVICE_FRONTEND: realtime-collab-frontend-service
  ECS_SERVICE_CORE: realtime-collab-core-backend-service
  ECS_SERVICE_REALTIME: realtime-collab-realtime-backend-service

# ─── Stage 1: Build & Push Docker images to ECR ──────────────────────────────
jobs:
  build-and-push:
    name: "Build & Push images to ECR"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: apps/frontend/node_modules
          key: frontend-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: frontend-

      - name: Cache backend-core node_modules
        uses: actions/cache@v4
        with:
          path: apps/backend-core/node_modules
          key: backend-core-${{ hashFiles('apps/backend-core/package-lock.json') }}
          restore-keys: backend-core-

      - name: Cache backend-realtime node_modules
        uses: actions/cache@v4
        with:
          path: apps/backend-realtime/node_modules
          key: backend-realtime-${{ hashFiles('apps/backend-realtime/package-lock.json') }}
          restore-keys: backend-realtime-

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO_FRONTEND"
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg VITE_API_BASE_URL=/ \
            --build-arg VITE_WS_URL= \
            apps/frontend
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

      - name: Build & push Core Backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO_CORE"
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            apps/backend-core
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

      - name: Build & push Realtime Backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO_REALTIME"
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            apps/backend-realtime
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

# ─── Stage 2: Terraform apply ─────────────────────────────────────────────────
  terraform-apply:
    name: "Terraform – apply infrastructure"
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      # ĐÃ BỔ SUNG ĐẦY ĐỦ CÁC BIẾN VÀ TAG LATEST
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -var="environment=staging" \
            -var="github_org=truongnhoxcon" \
            -var="github_repo=Real-time-Streaming-Collaboration" \
            -var="account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="frontend_image=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_FRONTEND }}:latest" \
            -var="core_backend_image=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_CORE }}:latest" \
            -var="realtime_backend_image=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_REALTIME }}:latest" \
            -no-color \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -no-color tfplan

# ─── Stage 3: ECS Rolling Update (Zero-Downtime Deployment) ──────────────────
  ecs-deploy:
    name: "ECS – rolling update"
    runs-on: ubuntu-latest
    needs: terraform-apply
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment – Frontend
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_FRONTEND" \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment – Core Backend
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_CORE" \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment – Realtime Backend
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_REALTIME" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait – Frontend steady state
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_FRONTEND"

      - name: Wait – Core Backend steady state
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_CORE"

      - name: Wait – Realtime Backend steady state
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_REALTIME"

      - name: Deployment complete
        run: |
          echo "✅ All ECS services are stable."
          echo "   Cluster  : $ECS_CLUSTER"