server {
    listen 80;
    server_name localhost;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # Serve the React app for every path.  The ALB listener rules that sit in
    # front of this container already handle /api/* and /ws/* routing:
    #
    #   /api/*  →  core-backend  target group  (priority 1)
    #   /ws/*   →  realtime-backend target group (priority 2)
    #   /*      →  this frontend target group   (default action)
    #
    # Because the ALB never forwards /api or /ws requests to this container,
    # there is no need for Nginx to reverse-proxy them.  Removing the upstream
    # proxy blocks eliminates the "host not found in upstream" crash that
    # occurred when Docker-Compose service names (backend-core, backend-realtime)
    # were referenced in an ECS/VPC environment where those names do not resolve.
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
